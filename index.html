<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo|login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- tailwind and daistUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- outfit google form -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- cdn icon from font awesome -->

<style>
    *{
         font-family: "Outfit", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
  <div class="w-[200px] m-auto mt-32">
    <img src="./assets/Logo-full.png" alt="">
  </div>
  <div class="form">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
            <label class="label text-neutral font-bold text-xl">mobile</label>
            <input id="input-number" type="text" maxlength="11" minlength="11" class="input rounded-2xl" value="01751020510" placeholder="enter your mobile number" />
          <br>
            <label class="label text-neutral font-bold text-xl ">4 Digit pin</label>
            <input id="input-pin" type="password" maxlength="4" minlength="4" class="input rounded-2xl" placeholder="enter 4 digit pin" />
            
            <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
        </fieldset>
       </div>
    </div>
  </div>
    

  <!-- js links -->
   <script src="./script/login.js"></script>
</body>
</html>
